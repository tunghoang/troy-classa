<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Information Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        .radio-group label { display: inline; font-weight: normal; margin-right: 10px; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Personal Information Form</h2>

    <form action="/namecard/form-handling.php" method="GET">
        <!-- Full Name: string -->
        <div class="form-group">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
        </div>

        <!-- Gender: boolean (represented by radio buttons) -->
        <div class="form-group radio-group">
            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="male" checked>
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>

        <!-- Position: string -->
        <div class="form-group">
            <label for="position">Position:</label>
            <input type="text" id="position" name="position" placeholder="e.g. Software Engineer" required>
        </div>

        <!-- Submit Button -->
        <button type="submit">Submit</button>
    </form>

</body>
</html>
